{% extends "base.html" %}

{% block title %}Login - HaloDrop{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1><i data-lucide="lock-keyhole" style="width: 32px; height: 32px; vertical-align: middle; margin-right: 8px;"></i>Login</h1>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">
                    <i data-lucide="user" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" required autofocus>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i data-lucide="key" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Password
                </label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember">
                    <i data-lucide="clock" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Remember me
                </label>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i data-lucide="log-in" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 6px;"></i>
                Login
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.register') }}">Register here</a></p>
        </div>
    </div>
</div>

<script>
    setTimeout(() => lucide.createIcons(), 100);
</script>
{% endblock %}
