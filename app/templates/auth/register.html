{% extends "base.html" %}

{% block title %}Register - HaloDrop{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1><i data-lucide="user-plus" style="width: 32px; height: 32px; vertical-align: middle; margin-right: 8px;"></i>Create Account</h1>
        <form method="POST" action="{{ url_for('auth.register') }}">
            <div class="form-group">
                <label for="username">
                    <i data-lucide="user" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Username
                </label>
                <input type="text" id="username" name="username" required autofocus minlength="3">
                <small>At least 3 characters</small>
            </div>
            
            <div class="form-group">
                <label for="email">
                    <i data-lucide="mail" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Email
                </label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="password">
                    <i data-lucide="key" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Password
                </label>
                <input type="password" id="password" name="password" required minlength="6">
                <small>At least 6 characters</small>
            </div>
            
            <div class="form-group">
                <label for="password_confirm">
                    <i data-lucide="shield-check" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 4px;"></i>
                    Confirm Password
                </label>
                <input type="password" id="password_confirm" name="password_confirm" required>
            </div>
            
            <button type="submit" class="btn btn-primary">
                <i data-lucide="check-circle" style="width: 16px; height: 16px; vertical-align: middle; margin-right: 6px;"></i>
                Register
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a></p>
        </div>
    </div>
</div>

<script>
    setTimeout(() => lucide.createIcons(), 100);
</script>
{% endblock %}
